module:
  id: OUTBREAK_VE_DEMO
  code: PH_DEMO_01
  title: "Outbreak Investigation and Vaccine Effectiveness"
  description: "Demonstration course showing Word-first structured publishing with public health content."
  default_render_mode: multi_page
  default_subpage_count: 3

sessions:
  - id: OUTBREAK_VE_DEMO-se01
    code: SE01
    title: "Foundations of Outbreak Investigation"
    type: standard
    required: true
    overview: "This session introduces outbreak investigation, vaccination status, and vaccine effectiveness."
    learning_objectives:
      - "Explain why vaccine effectiveness matters in outbreak investigations."
      - "Interpret outbreak data by vaccination status."
      - "Calculate vaccine effectiveness using relative risk."
    render_mode: multi_page

    sections:
      - id: OUTBREAK_VE_DEMO-se01-sec01
        title: "Outbreak Context"
        kind: section_overview
        number: 1
        navigation_style: numbered_subpages
        subpage_count: 3

        subpages:
          - id: OUTBREAK_VE_DEMO-se01-sec01-sp01
            title: "Introducing the Outbreak"
            kind: text_page
            source_docx: "imports/outbreak_ve_demo/docx/01_vaccine_effectiveness_outbreak.docx"

          - id: OUTBREAK_VE_DEMO-se01-sec01-sp02
            title: "Why Vaccine Effectiveness Matters"
            kind: text_page
            source_docx: "imports/outbreak_ve_demo/docx/01_vaccine_effectiveness_outbreak.docx"

          - id: OUTBREAK_VE_DEMO-se01-sec01-sp03
            title: "Key Public Health Questions"
            kind: text_page
            source_docx: "imports/outbreak_ve_demo/docx/01_vaccine_effectiveness_outbreak.docx"

      - id: OUTBREAK_VE_DEMO-se01-sec02
        title: "Measures and Data"
        kind: section_overview
        number: 2
        navigation_style: numbered_subpages
        subpage_count: 3

        subpages:
          - id: OUTBREAK_VE_DEMO-se01-sec02-sp01
            title: "Observed Data"
            kind: text_page
            source_docx: "imports/outbreak_ve_demo/docx/02_measures_and_data.docx"

          - id: OUTBREAK_VE_DEMO-se01-sec02-sp02
            title: "Relative Risk"
            kind: text_page
            source_docx: "imports/outbreak_ve_demo/docx/02_measures_and_data.docx"

          - id: OUTBREAK_VE_DEMO-se01-sec02-sp03
            title: "Formula for Vaccine Effectiveness"
            kind: text_page
            source_docx: "imports/outbreak_ve_demo/docx/02_measures_and_data.docx"

      - id: OUTBREAK_VE_DEMO-se01-sec03
        title: "Calculating Vaccine Effectiveness"
        kind: section_overview
        number: 3
        navigation_style: numbered_subpages
        subpage_count: 3

        subpages:
          - id: OUTBREAK_VE_DEMO-se01-sec03-sp01
            title: "Step-by-Step Calculation"
            kind: text_page
            source_docx: "imports/outbreak_ve_demo/docx/03_calculating_vaccine_effectiveness.docx"

          - id: OUTBREAK_VE_DEMO-se01-sec03-sp02
            title: "Worked Example"
            kind: text_page
            source_docx: "imports/outbreak_ve_demo/docx/03_calculating_vaccine_effectiveness.docx"

          - id: OUTBREAK_VE_DEMO-se01-sec03-sp03
            title: "Check Your Understanding"
            kind: text_page
            source_docx: "imports/outbreak_ve_demo/docx/03_calculating_vaccine_effectiveness.docx"

  - id: OUTBREAK_VE_DEMO-se02
    code: SE02
    title: "Interpretation and Communication"
    type: standard
    required: true
    overview: "This session focuses on visualisation, interpretation, and communicating outbreak findings."
    learning_objectives:
      - "Interpret charts and tables used in outbreak analysis."
      - "Recognise assumptions and limitations in vaccine effectiveness estimates."
      - "Communicate findings in a public health context."
    render_mode: multi_page

    sections:
      - id: OUTBREAK_VE_DEMO-se02-sec01
        title: "Visualising Results"
        kind: section_overview
        number: 1
        navigation_style: numbered_subpages
        subpage_count: 3

        subpages:
          - id: OUTBREAK_VE_DEMO-se02-sec01-sp01
            title: "Risk by Vaccination Status"
            kind: text_page
            source_docx: "imports/outbreak_ve_demo/docx/04_visualising_outbreak_data.docx"

          - id: OUTBREAK_VE_DEMO-se02-sec01-sp02
            title: "Epidemic Curve"
            kind: text_page
            source_docx: "imports/outbreak_ve_demo/docx/04_visualising_outbreak_data.docx"

          - id: OUTBREAK_VE_DEMO-se02-sec01-sp03
            title: "Using R for Public Health Visualisation"
            kind: text_page
            source_docx: "imports/outbreak_ve_demo/docx/04_visualising_outbreak_data.docx"

      - id: OUTBREAK_VE_DEMO-se02-sec02
        title: "Interpreting Evidence"
        kind: section_overview
        number: 2
        navigation_style: numbered_subpages
        subpage_count: 3

        subpages:
          - id: OUTBREAK_VE_DEMO-se02-sec02-sp01
            title: "Interpreting Vaccine Effectiveness"
            kind: text_page
            source_docx: "imports/outbreak_ve_demo/docx/05_interpreting_vaccine_effectiveness.docx"

          - id: OUTBREAK_VE_DEMO-se02-sec02-sp02
            title: "Assumptions and Limitations"
            kind: text_page
            source_docx: "imports/outbreak_ve_demo/docx/05_interpreting_vaccine_effectiveness.docx"

          - id: OUTBREAK_VE_DEMO-se02-sec02-sp03
            title: "Common Misinterpretations"
            kind: text_page
            source_docx: "imports/outbreak_ve_demo/docx/05_interpreting_vaccine_effectiveness.docx"

      - id: OUTBREAK_VE_DEMO-se02-sec03
        title: "Reporting and Action"
        kind: section_overview
        number: 3
        navigation_style: numbered_subpages
        subpage_count: 3

        subpages:
          - id: OUTBREAK_VE_DEMO-se02-sec03-sp01
            title: "Reading the Outbreak Report"
            kind: text_page
            source_docx: "imports/outbreak_ve_demo/docx/06_reporting_and_public_health_action.docx"

          - id: OUTBREAK_VE_DEMO-se02-sec03-sp02
            title: "Communicating Findings"
            kind: text_page
            source_docx: "imports/outbreak_ve_demo/docx/06_reporting_and_public_health_action.docx"

          - id: OUTBREAK_VE_DEMO-se02-sec03-sp03
            title: "Public Health Implications"
            kind: text_page
            source_docx: "imports/outbreak_ve_demo/docx/06_reporting_and_public_health_action.docx"