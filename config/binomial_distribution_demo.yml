module:
  id: BINOMIAL_DISTRIBUTION
  code: BINOMIAL_01
  title: "Binomial Distribution in Epidemiology"
  description: "Single-page learning page."
  default_render_mode: single_page
  default_navigation_style: numbered_subpages
  default_subpage_count: 1

sessions:
  - id: BINOMIAL_DISTRIBUTION-se01
    code: SE01
    title: "Binomial Distribution"
    type: standard
    required: true
    overview: "This session introduces the binomial distribution through an epidemiological example."
    learning_objectives:
      - "Explain the assumptions of the binomial distribution."
      - "Interpret a simple epidemiological example."
      - "Read code used to calculate binomial probabilities."
      - "Interpret a visualisation of the distribution."
    render_mode: single_page

    sections:
      - id: BINOMIAL_DISTRIBUTION-se01-sec01
        title: "Core Concepts and Interpretation"
        kind: section_overview
        number: 1
        navigation_style: numbered_subpages
        subpage_count: 1

        subpages:
          - id: BINOMIAL_DISTRIBUTION-se01-sec01-sp01
            title: "Binomial Distribution in Epidemiology"
            kind: concept_page

            resources:
              - title: "Binomial Distribution (PDF)"
                file: "resources/pdf/binomial-distribution.pdf"
                output_file: "binomial-distribution.pdf"
                display: embed

              - title: "Binomial Distribution Slides"
                file: "resources/ppt/binomial-distribution.ppt"
                output_file: "binomial-distribution.ppt"
                display: link

            interactions:
              - type: callout_emphasis
                variant: important

              - type: compare_tabs

              - type: guided_video
                video_url: "https://www.youtube.com/watch?v=ATUcJmGxJqs&time_continue=0&source_ve_path=NzY3NTg&embeds_referring_euri=https%3A%2F%2Fwebcal.am.lshtm.ac.uk%2F"

              - type: code_example
                variant: r

              - type: code_output_interpretation

              - type: annotated_figure

              - type: reveal_sequence
                variant: answer_reveal

              - type: self_check
                variant: quick

              - type: interpretation_prompt